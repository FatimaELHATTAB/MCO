    CONFIRMED_BY_ORBIS --> PROVIDED_BY_RMPM: TVA RMPM ajoutée
    CONFIRMED_BY_ORBIS --> CONFIRMED_BY_VIES: Calcul devient possible + VIES OK
    CONFIRMED_BY_ORBIS --> VIES_ERROR: Calcul devient possible + VIES_ERROR
    CONFIRMED_BY_ORBIS --> CONFIRMED_BY_REFINITIV: Orbis perdu + Refinitiv OK
    CONFIRMED_BY_ORBIS --> NOT_FOUND: Orbis perdu + VIES NOT_FOUND
    CONFIRMED_BY_ORBIS --> NOT_ELIGIBLE: Orbis perdu + aucun fallback

    CONFIRMED_BY_REFINITIV --> PROVIDED_BY_RMPM: TVA RMPM ajoutée
    CONFIRMED_BY_REFINITIV --> CONFIRMED_BY_VIES: Calcul devient possible + VIES OK
    CONFIRMED_BY_REFINITIV --> VIES_ERROR: Calcul devient possible + VIES_ERROR
    CONFIRMED_BY_REFINITIV --> CONFIRMED_BY_ORBIS: Orbis apparaît + VIES OK
    CONFIRMED_BY_REFINITIV --> NOT_FOUND: Refinitiv perdu + VIES NOT_FOUND
    CONFIRMED_BY_REFINITIV --> NOT_ELIGIBLE: Refinitiv perdu + aucun fallback

    NOT_FOUND --> PROVIDED_BY_RMPM: TVA RMPM ajoutée
    NOT_FOUND --> CONFIRMED_BY_VIES: Calcul TVA + VIES OK
    NOT_FOUND --> CONFIRMED_BY_ORBIS: Orbis trouvé + VIES OK
    NOT_FOUND --> CONFIRMED_BY_REFINITIV: Refinitiv trouvé + VIES OK
    NOT_FOUND --> VIES_ERROR: Retry + VIES_ERROR
    NOT_FOUND --> NOT_ELIGIBLE: Plus aucune source exploitable

    NOT_ELIGIBLE --> PROVIDED_BY_RMPM: TVA RMPM ajoutée
    NOT_ELIGIBLE --> CONFIRMED_BY_VIES: Données deviennent calculables + VIES OK
    NOT_ELIGIBLE --> CONFIRMED_BY_ORBIS: Orbis trouvé + VIES OK
    NOT_ELIGIBLE --> CONFIRMED_BY_REFINITIV: Refinitiv trouvé + VIES OK

    VIES_ERROR --> CONFIRMED_BY_VIES: Retry calcul + VIES OK
    VIES_ERROR --> CONFIRMED_BY_ORBIS: Retry / fallback Orbis OK
    VIES_ERROR --> CONFIRMED_BY_REFINITIV: Retry / fallback Refinitiv OK
    VIES_ERROR --> NOT_FOUND: Retry + VIES NOT_FOUND
    VIES_ERROR --> PROVIDED_BY_RMPM: TVA RMPM ajoutée

