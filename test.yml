1. Sequence Diagram — Technical Flow

This diagram describes how components interact to determine the VAT status of a Legal Entity.

It highlights the responsibilities of each component:
- Batch Collect loads and updates data sources
- UM-Matching selects the best available VAT candidate
- Batch TVA performs validation and computation
- VIES API confirms or rejects VAT numbers
- LEGAL_ENTITY stores the final status

This view focuses on system interactions rather than decision logic.



sequenceDiagram
    autonumber

    participant BC as Batch Collect
    participant TIR as RPMP Entity Table
    participant EXT as External Sources (Orbis / Refinitiv)
    participant MATCH as UM-Matching
    participant LE as LEGAL_ENTITY
    participant BTVA as Batch TVA
    participant VIES as VIES API

    BC->>TIR: Insert / update RPMP entity
    BC->>EXT: Insert / update Orbis / Refinitiv data

    MATCH->>TIR: Read RPMP entity
    MATCH->>EXT: Read external sources



