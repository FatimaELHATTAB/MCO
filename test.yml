3. State Machine — Lifecycle
This diagram illustrates how the VAT status evolves over time.

Unlike the flowchart, which describes a single decision,
the state machine captures transitions between states triggered by data changes.

A Legal Entity can move from one status to another when:
- RMPM data is updated
- identification data changes (SIREN, country)
- Orbis or Refinitiv matching appears or disappears
- VIES returns a different result

The status is not final. It is continuously re-evaluated based on the latest available data.

At each transition, the same priority rule is applied:
RMPM > Computation > Orbis > Refinitiv.



