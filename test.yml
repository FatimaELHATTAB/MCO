# provider_runner.py
# À mettre dans ta classe ProviderRunner
# ============================================================

import gc
import polars as pl


def run(
    self,
    country: str,
    df_identity: pl.LazyFrame | pl.DataFrame | None = None,
) -> tuple[pl.DataFrame, pl.DataFrame]:
    """
    Point d'entrée unique.

    - ORBIS : batch SQL avec LIMIT / OFFSET pour éviter saturation mémoire
    - autres providers : fonctionnement standard
    """

    if self.provider.lower() == "orbis":
        return self._run_orbis_batched(
            country=country,
            df_identity=df_identity,
        )

    return self._run_standard(
        country=country,
        df_identity=df_identity,
    )


def _run_standard(
    self,
    country: str,
    df_identity: pl.LazyFrame | pl.DataFrame | None = None,
) -> tuple[pl.DataFrame, pl.DataFrame]:
    """
    Ancienne logique pour RMPM / REFINITIV / autres providers.
    """

    self.logger.info(
        f"Running matching for provider={self.provider} | country={country}"
    )

    rule_set = load_rules_for_provider(self.provider)

    identity_already_provided = df_identity is not None

    df_normalized = self.data_loader.load_normalized(
        provider=self.provider,
        country=country,
        job_execution_id=self.job_execution_id,
    )

    if df_identity is None:
        df_identity = self.data_loader.load_legal_entity(
            provider=self.provider,
        )

    df_normalized = self._to_lazy(df_normalized)
    df_identity = self._to_lazy(df_identity)

    self.logger.info("Data loaded successfully")

    df_normalized = self._explode_if_needed_once(
        df_normalized=df_normalized,
        df_identity=df_identity,
        identity_already_provided=identity_already_provided,
    )

    pipeline = MatchingPipelineLazy(
        rule_set,
        left_id="local_id",
        right_id="tpn_id",
        run_fuzzy=False,
    )

    matches, not_matched = pipeline.run(
        df_normalized,
        df_identity,
    )

    if matches is None:
        matches = pl.DataFrame()

    if not_matched is None:
        not_matched = pl.DataFrame()

    self.logger.info(
        f"Before final cleanup | matches={matches.shape} | not_matched={not_matched.shape}"
    )

    matches = self._deduplicate_matches(matches)

    not_matched = self._remove_matched_from_not_matched(
        not_matched=not_matched,
        matches=matches,
    )

    self.logger.info(
        f"Matching done | final matches={matches.shape} | final not_matched={not_matched.shape}"
    )

    del df_normalized
    del df_identity
    del pipeline
    gc.collect()

    return matches, not_matched


def _run_orbis_batched(
    self,
    country: str,
    df_identity: pl.LazyFrame | pl.DataFrame | None = None,
) -> tuple[pl.DataFrame, pl.DataFrame]:
    """
    Logique spéciale ORBIS.

    Important :
    - on ne charge pas tout ORBIS en mémoire
    - on charge ORBIS batch par batch depuis SQL
    - on ne garde que les matches
    - on ne garde PAS les not_matched de chaque batch
    - les not_matched sont calculés à la fin depuis identity
    """

    self.logger.info(
        f"Running ORBIS batched matching | country={country}"
    )

    rule_set = load_rules_for_provider(self.provider)

    if df_identity is None:
        self.logger.info("Loading identity once for ORBIS")
        df_identity = self.data_loader.load_legal_entity(
            provider=self.provider,
        )

    df_identity = self._to_lazy(df_identity)

    batch_size = 50_000
    offset = 0
    batch_idx = 1

    all_matches: list[pl.DataFrame] = []

    while True:
        self.logger.info(
            f"Loading ORBIS batch | batch_idx={batch_idx} | offset={offset} | batch_size={batch_size}"
        )

        df_normalized_batch = self.data_loader.load_normalized(
            provider=self.provider,
            country=country,
            job_execution_id=self.job_execution_id,
            limit=batch_size,
            offset=offset,
        )

        if df_normalized_batch is None or df_normalized_batch.is_empty():
            self.logger.info(
                f"No more ORBIS rows | last_offset={offset}"
            )
            break

        self.logger.info(
            f"ORBIS batch loaded | batch_idx={batch_idx} | shape={df_normalized_batch.shape}"
        )

        df_normalized_batch = self._to_lazy(df_normalized_batch)

        df_normalized_batch = self._explode_if_needed_once(
            df_normalized=df_normalized_batch,
            df_identity=df_identity,
            identity_already_provided=True,
        )

        pipeline = MatchingPipelineLazy(
            rule_set,
            left_id="local_id",
            right_id="tpn_id",
            run_fuzzy=False,
        )

        matches, _ = pipeline.run(
            df_normalized_batch,
            df_identity,
        )

        if matches is not None and not matches.is_empty():
            matches = matches.with_columns(
                pl.lit(batch_idx).alias("batch_id"),
                pl.lit(offset).alias("batch_offset"),
            )

            all_matches.append(matches)

            self.logger.info(
                f"ORBIS batch done | batch_idx={batch_idx} | matches={matches.shape}"
            )
        else:
            self.logger.info(
                f"ORBIS batch done | batch_idx={batch_idx} | no matches"
            )

        del df_normalized_batch
        del matches
        del pipeline
        gc.collect()

        offset += batch_size
        batch_idx += 1

    matches = self._concat_dataframes(all_matches)

    self.logger.info(
        f"ORBIS all batches done | matches before dedup={matches.shape}"
    )

    matches = self._deduplicate_matches(matches)

    not_matched = self._build_not_matched_from_identity(
        df_identity=df_identity,
        matches=matches,
    )

    self.logger.info(
        f"ORBIS matching done | final matches={matches.shape} | final not_matched={not_matched.shape}"
    )

    del df_identity
    del all_matches
    gc.collect()

    return matches, not_matched


def _to_lazy(
    self,
    df: pl.LazyFrame | pl.DataFrame,
) -> pl.LazyFrame:
    if isinstance(df, pl.LazyFrame):
        return df

    if isinstance(df, pl.DataFrame):
        return df.lazy()

    raise TypeError(
        f"Expected Polars DataFrame or LazyFrame, got {type(df)}"
    )


def _concat_dataframes(
    self,
    dfs: list[pl.DataFrame],
) -> pl.DataFrame:
    if not dfs:
        return pl.DataFrame()

    return pl.concat(
        dfs,
        how="vertical_relaxed",
    )


def _deduplicate_matches(
    self,
    matches: pl.DataFrame,
) -> pl.DataFrame:
    if matches is None or matches.is_empty():
        return pl.DataFrame()

    dedup_cols = [
        col
        for col in ["local_id", "tpn_id", "matching_rule"]
        if col in matches.columns
    ]

    if not dedup_cols:
        return matches.unique()

    return matches.unique(
        subset=dedup_cols,
        keep="first",
    )


def _remove_matched_from_not_matched(
    self,
    not_matched: pl.DataFrame,
    matches: pl.DataFrame,
) -> pl.DataFrame:
    if not_matched is None or not_matched.is_empty():
        return pl.DataFrame()

    if matches is None or matches.is_empty():
        return not_matched

    if "tpn_id" not in not_matched.columns or "tpn_id" not in matches.columns:
        return not_matched

    matched_tpn_ids = (
        matches
        .select("tpn_id")
        .drop_nulls()
        .unique()
    )

    return not_matched.join(
        matched_tpn_ids,
        on="tpn_id",
        how="anti",
    )


def _build_not_matched_from_identity(
    self,
    df_identity: pl.LazyFrame | pl.DataFrame,
    matches: pl.DataFrame,
) -> pl.DataFrame:
    """
    Pour ORBIS :
    on calcule les not_matched seulement à la fin.

    Surtout ne pas faire all_not_matched.append(not_matched)
    dans la boucle ORBIS.
    """

    df_identity = self._to_lazy(df_identity)

    if matches is None or matches.is_empty():
        self.logger.info("No ORBIS matches found, all identity rows are not_matched")
        return df_identity.collect()

    if "tpn_id" not in matches.columns:
        self.logger.warning(
            "Column tpn_id not found in matches, returning full identity as not_matched"
        )
        return df_identity.collect()

    matched_tpn_ids = (
        matches
        .select("tpn_id")
        .drop_nulls()
        .unique()
        .lazy()
    )

    not_matched = (
        df_identity
        .join(
            matched_tpn_ids,
            on="tpn_id",
            how="anti",
        )
        .collect()
    )

    return not_matched


