# Flexible Change-Based Action Triggering

## 1. Context

Today, some processes are already triggered from the `task_queue`.

For example, for `update_identification`, we do not replay the full matching.
The process uses the existing matching results and replays only the prioritization logic to update `legal_entity`.

Now, we need a more flexible mechanism to react to specific data changes.

The main data is stored around `identity`, with related tables such as:

* `lifecycle`
* `address`
* `tax`
* `company_identifier`

All these tables are linked through the `tpn_id`, which allows us to retrieve the related `legal_entity`.

---

## 2. Need

Some data changes can have a business impact and must trigger a specific action.

First use case:

```text
Table: lifecycle
Column: bnpp_entity

If bnpp_entity changes
and the entity was previously outside the CRDS scope
and is now inside the CRDS scope
then trigger a CRDS action.
```

For this first case, the action is:

```text
Insert a CRDS_NOTIFICATION into task_queue with the related tpn_id.
```

But the need is not limited to CRDS.

Tomorrow, other changes may require other actions:

```text
Address changed
→ trigger an address process

Tax information changed
→ trigger a tax process

Company identifier changed
→ trigger an identifier process

Legal entity data changed
→ replay prioritization or update another table
```

So the goal is to avoid hardcoding one specific process per use case.

---

## 3. Proposed Solution

The proposed solution is to introduce a generic mechanism based on this logic:

```text
Data change detected
→ rule evaluation
→ configured action triggered
```

The action can be:

```text
- insert a task in task_queue
- launch a dedicated process
- update a target table
- replay prioritization
- write an audit/log event
```

This means the solution is not only a notification mechanism.
A notification is only one possible action.

---

## 4. Configuration Table

To keep the mechanism flexible, the rules can be stored in a configuration table.

Proposed table:

```text
change_action_rule
```

### Table structure

| Column                | Description                                                 |
| --------------------- | ----------------------------------------------------------- |
| `rule_id`             | Technical ID of the rule                                    |
| `rule_name`           | Functional name of the rule                                 |
| `source_table`        | Table to monitor, for example `lifecycle`, `address`, `tax` |
| `source_column`       | Column to monitor, for example `bnpp_entity`                |
| `old_value_condition` | Condition on the previous value                             |
| `new_value_condition` | Condition on the new value                                  |
| `action_type`         | Type of action to trigger                                   |
| `action_name`         | Name of the action                                          |
| `target_process`      | Process to call if needed                                   |
| `target_table`        | Table to update if needed                                   |
| `is_enabled`          | Activate or deactivate the rule                             |
| `priority`            | Priority if several rules are triggered                     |
| `created_at`          | Creation timestamp                                          |
| `updated_at`          | Last update timestamp                                       |

---

## 5. Example of Rules

| rule_name                 | source_table         | source_column      | condition                                                    | action_type               | action_name                 |
| ------------------------- | -------------------- | ------------------ | ------------------------------------------------------------ | ------------------------- | --------------------------- |
| Entity enters CRDS scope  | `lifecycle`          | `bnpp_entity`      | Old value outside CRDS scope and new value inside CRDS scope | `TASK_QUEUE_NOTIFICATION` | `CRDS_NOTIFICATION`         |
| Address changed           | `address`            | `address_value`    | Any change                                                   | `PROCESS_EXECUTION`       | `ADDRESS_UPDATE_PROCESS`    |
| Tax changed               | `tax`                | `tax_value`        | Any change                                                   | `PROCESS_EXECUTION`       | `TAX_PROCESSING`            |
| Identifier changed        | `company_identifier` | `identifier_value` | Any change                                                   | `PROCESS_EXECUTION`       | `IDENTIFIER_RECONCILIATION` |
| Legal entity data changed | `legal_entity`       | Selected fields    | Any change                                                   | `PRIORITIZATION_REPLAY`   | `UPDATE_IDENTIFICATION`     |

---

## 6. How It Works

When the batch collect updates data, the process compares the previous value and the new value.

If a change is detected, the process checks the `change_action_rule` table.

It searches for an enabled rule matching:

```text
source_table
source_column
old_value_condition
new_value_condition
```

If the rule condition is satisfied, the configured action is triggered.

Example for CRDS:

```text
source_table = lifecycle
source_column = bnpp_entity
old_value_condition = NOT_IN_CRDS_SCOPE
new_value_condition = IN_CRDS_SCOPE
action_type = TASK_QUEUE_NOTIFICATION
action_name = CRDS_NOTIFICATION
```

The process will insert a task in `task_queue`.

Example task:

```text
task_name      = CRDS_NOTIFICATION
status         = PENDING
tpn_id         = impacted tpn_id
source_table   = lifecycle
source_column  = bnpp_entity
old_value      = previous bnpp_entity value
new_value      = new bnpp_entity value
event_type     = BNPP_ENTITY_ENTERED_CRDS_SCOPE
created_at     = current timestamp
```

The `tpn_id` is mandatory because it links the event to the impacted `identity`, `legal_entity`, and related tables.

---

## 7. Action Types

| action_type               | Meaning                         |
| ------------------------- | ------------------------------- |
| `TASK_QUEUE_NOTIFICATION` | Insert a task into `task_queue` |
| `PROCESS_EXECUTION`       | Launch a dedicated process      |
| `DATA_UPDATE`             | Update a target table           |
| `PRIORITIZATION_REPLAY`   | Replay prioritization logic     |
| `AUDIT_ONLY`              | Only write an audit/log event   |

---

