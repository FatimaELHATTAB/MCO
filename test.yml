WITH base AS (
  SELECT local_id, flux_source, company_name, company_name_clean, incorporation_country
  FROM own_91109_svg_um.provider_data_normalized
  WHERE flux_execution_id = '151'
    AND incorporation_country = 'FR'
),
identifiers AS (
  SELECT p.local_id,
    STRING_AGG(DISTINCT identifier ->> 'company_identifier', '|'
      ORDER BY identifier ->> 'company_identifier'
      FILTER (WHERE identifier ->> 'company_identifier_nature' = 'N')) AS national_registry,
    STRING_AGG(DISTINCT REGEXP_REPLACE(identifier ->> 'company_identifier', '[^0-9]', '', 'g'), '|'
      ORDER BY REGEXP_REPLACE(identifier ->> 'company_identifier', '[^0-9]', '', 'g')
      FILTER (WHERE identifier ->> 'company_identifier_nature' = 'N')) AS national_registry_cleaned,
    STRING_AGG(DISTINCT identifier ->> 'company_identifier', '|'
      ORDER BY identifier ->> 'company_identifier'
      FILTER (WHERE identifier ->> 'company_identifier_nature' = 'I')) AS international_registry
  FROM own_91109_svg_um.provider_data_normalized p
  LEFT JOIN LATERAL jsonb_array_elements(p.company_identifier_data) AS identifier ON TRUE
  WHERE p.flux_execution_id = '151'
    AND p.incorporation_country = 'FR'
  GROUP BY p.local_id
),
taxes AS (
  SELECT p.local_id,
    STRING_AGG(DISTINCT tax ->> 'tax_id', '|') AS tax_id
  FROM own_91109_svg_um.provider_data_normalized p
  LEFT JOIN LATERAL jsonb_array_elements(p.tax_data) AS tax ON TRUE
  WHERE p.flux_execution_id = '151'
    AND p.incorporation_country = 'FR'
  GROUP BY p.local_id
  HAVING STRING_AGG(DISTINCT tax ->> 'tax_id', '|') IS NOT NULL
)
SELECT DISTINCT ON (b.incorporation_country, t.tax_id)
  b.local_id, b.flux_source, b.company_name, b.company_name_clean,
  b.incorporation_country,
  i.national_registry, i.national_registry_cleaned, i.international_registry,
  t.tax_id
FROM base b
JOIN taxes t ON t.local_id = b.local_id
LEFT JOIN identifiers i ON i.local_id = b.local_id
ORDER BY b.incorporation_country, t.tax_id, b.local_id;
