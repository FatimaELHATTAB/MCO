4. Open Point — VIES_ERROR Handling

VIES can return three types of outcomes:
- OK: the VAT number is valid
- NOT_FOUND: the VAT number is invalid or does not exist
- VIES_ERROR: a technical failure or service unavailability

The VIES_ERROR case introduces ambiguity.

It does not indicate whether the VAT number is valid or not,
but simply that the system is temporarily unable to determine it.

This creates a gap in the current logic.

Example scenario:

1. A Legal Entity is CONFIRMED_BY_ORBIS
2. Identification data changes
3. VAT becomes computable
4. VIES is called on the computed VAT
5. VIES returns VIES_ERROR

Question:
Should the system overwrite a previously confirmed status
with a technical error?

---

### Key Issue

```text
A VIES_ERROR should not invalidate a previously confirmed and reliable status.


