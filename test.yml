from typing import Any
import polars as pl


def load_normalized(
    self,
    provider: str,
    country: str,
    job_execution_id: int | str | None = None,
    limit: int | None = None,
    offset: int | None = None,
) -> pl.DataFrame:
    """
    Fonction commune pour ORBIS / REFINITIV / RMPM.

    Règle :
    - country est toujours présent
    - job_execution_id est optionnel
    - si job_execution_id existe, il est mis en premier dans le WHERE
    - limit / offset sont optionnels, utilisés surtout pour ORBIS
    """

    spec = _load_provider_spec(self._config_dir, provider)

    norm_schema = (
        _yaml_to_polars_schema(spec.normalized.schema_yaml)
        if spec.normalized.schema_yaml
        else None
    )

    params: dict[str, Any] = dict(spec.params_defaults)

    provider_lower = provider.lower()

    # Alias SQL selon le provider
    # ORBIS et REFINITIV utilisent l'alias p
    # RMPM utilise l'alias le
    if provider_lower == "rmpm":
        alias = "le"
    else:
        alias = "p"

    conditions: list[str] = []

    # 1. flux_execution_id en premier s'il existe
    if job_execution_id is not None:
        conditions.append(f"{alias}.flux_execution_id = %(flux_execution_id)s")
        params["flux_execution_id"] = job_execution_id

    # 2. country toujours présent
    conditions.append(f"{alias}.incorporation_country = %(country)s")
    params["country"] = country

    where_clause = " AND ".join(conditions)

    # 3. LIMIT / OFFSET optionnel
    if limit is not None:
        limit_clause = f"LIMIT {int(limit)} OFFSET {int(offset or 0)}"
    else:
        limit_clause = ""

    query = spec.normalized.query.format(
        where_clause=where_clause,
        limit_clause=limit_clause,
    )

    with self._db.connection() as conn:
        df_normalized = _read_query_as_df(
            conn=conn,
            query=query,
            params=params,
            schema=norm_schema,
            chunk_size=spec.chunk_size,
        )

    return df_normalized


