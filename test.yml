## 9. Sequence Diagram — Generic Case

```mermaid
sequenceDiagram
    autonumber

    participant BC as PROCESS<br/>Batch Collect
    participant DT as TABLE<br/>Data tables<br/>identity / lifecycle / address / tax / company_identifier
    participant CD as PROCESS<br/>Change Detection
    participant CFG as TABLE<br/>change_action_rule
    participant RE as PROCESS<br/>Rule Evaluation
    participant AE as PROCESS<br/>Action Execution
    participant TQ as TABLE<br/>task_queue
    participant DP as PROCESS<br/>Downstream Process

    BC->>DT: Load / update data
    BC->>CD: Send previous and new values

    CD->>CD: Compare monitored fields

    alt Relevant change detected
        CD->>RE: Send change details<br/>tpn_id, table, column, old value, new value

        RE->>CFG: Retrieve matching rule
        CFG-->>RE: Return configured action

        RE->>RE: Evaluate rule conditions

        alt Rule condition is satisfied
            RE->>AE: Trigger configured action

            alt Action type = task_queue notification
                AE->>TQ: Insert task with tpn_id and payload
                TQ-->>AE: Task created
            else Action type = direct process execution
                AE->>DP: Launch dedicated process
                DP-->>AE: Process executed
            else Action type = data update
                AE->>DT: Update impacted data
                DT-->>AE: Data updated
            end

        else Rule condition is not satisfied
            RE-->>CD: No action triggered
        end

    else No relevant change detected
        CD-->>BC: No action
    end
```

---

## 10. Sequence Diagram — CRDS Example

```mermaid
sequenceDiagram
    autonumber

    participant BC as PROCESS<br/>Batch Collect
    participant LC as TABLE<br/>lifecycle
    participant CD as PROCESS<br/>Change Detection
    participant CFG as TABLE<br/>change_action_rule
    participant RE as PROCESS<br/>Rule Evaluation
    participant TQ as TABLE<br/>task_queue
    participant CRDS as PROCESS<br/>CRDS Processing

    BC->>LC: Update lifecycle data
    BC->>CD: Send old and new lifecycle values

    CD->>CD: Detect change on bnpp_entity

    alt bnpp_entity changed
        CD->>RE: Send change details<br/>tpn_id, old value, new value

        RE->>CFG: Read CRDS rule
        CFG-->>RE: Return rule configuration

        RE->>RE: Check old value outside CRDS scope<br/>and new value inside CRDS scope

        alt Entity entered CRDS scope
            RE->>TQ: Insert CRDS_NOTIFICATION<br/>with tpn_id
            TQ-->>RE: Notification created
        else Entity did not enter CRDS scope
            RE-->>CD: No CRDS action
        end

    else bnpp_entity did not change
        CD-->>BC: No action
    end

    CRDS->>TQ: Read pending CRDS_NOTIFICATION
    TQ-->>CRDS: Return impacted tpn_id
```

---

## 11. Why This Solution Is Useful

This solution avoids building a specific technical process for each new business case.

Instead of creating hardcoded logic every time a new field needs to trigger something, we use a common mechanism.

The rule table makes the behavior easier to understand, easier to maintain, and easier to extend.

The CRDS case is the first use case, but the same logic can later be reused for other changes.

---

## 12. Summary

The objective is to detect important data changes and trigger the right action.

The first example is:

```text
If lifecycle.bnpp_entity changes
and the entity enters the CRDS scope
then create a CRDS_NOTIFICATION in task_queue with the related tpn_id.
```

But the target solution is more generic:

```text
Data change detected
→ rule evaluation
→ configured action triggered
```

The configured action can be a notification, a process execution, a data update, a prioritization replay, or any other future treatment.
