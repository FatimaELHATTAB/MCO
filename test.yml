2. Flowchart — Decision Logic
This diagram represents the decision logic used to determine the VAT status.

The system applies a strict priority order:
1. VAT provided by RMPM (trusted, no VIES validation)
2. Computed VAT (based on SIREN and country)
3. Orbis matching
4. Refinitiv matching

VIES validation is applied only when the VAT does not come from RMPM.

The flow describes how the system selects the best available source and
produces a final status based on validation results.



flowchart TD

    A[Tier reçu ou mis à jour]

    A --> B{TVA fournie par RMPM ?}
    B -->|Oui| C[PROVIDED_BY_RMPM]

    B -->|Non| D{TVA calculable ?}

    D -->|Oui| E[Calcul TVA]
    E --> F[Validation VIES]

    F -->|OK| G[CONFIRMED_BY_VIES]
    F -->|NOT_FOUND| H[NOT_FOUND]
    F -->|VIES_ERROR| X[VIES_ERROR<br/>Traitement à définir]

    D -->|Non| I{Matching Orbis ?}

    I -->|Oui| J[Validation VIES Orbis]
    J -->|OK| K[CONFIRMED_BY_ORBIS]
    J -->|NOT_FOUND| H
    J -->|VIES_ERROR| X

    I -->|Non| L{Matching Refinitiv ?}

    L -->|Oui| M[Validation VIES Refinitiv]
    M -->|OK| N[CONFIRMED_BY_REFINITIV]
    M -->|NOT_FOUND| H
    M -->|VIES_ERROR| X

    L -->|Non| O[NOT_ELIGIBLE]

    C --> END[Fin]
    G --> END
    K --> END
    N --> END
    H --> END
    O --> END
    X --> END

    END -->|Mise à jour des données| A

