Today, the current process handles update_identification notifications from the task_queue table without replaying the full matching process. It closes the current active row in legal_entity, retrieves the already existing matches from the matching table, and replays only the prioritization process to update the active value in legal_entity.

# Flexible Change-Based Action Triggering

## 1. Context

Today, we already have processes that react to updates coming from the batch collect.

For example, when an `update_identification` notification is received, we do not replay the full matching process. We only use the existing matching results and replay the prioritization logic to update the active data in `legal_entity`.

Now, we have a new need.

Some changes in the data should trigger a specific action because they have a business impact.

The first case is linked to the `lifecycle` table and the `bnpp_entity` column.

If `bnpp_entity` changes, and the entity moves from outside the CRDS scope to inside the CRDS scope, we need to trigger a CRDS action.

For this first case, the action is to create a `CRDS_NOTIFICATION` in the `task_queue` table with the related `tpn_id`.

But we do not want to build something only for this CRDS case.

Tomorrow, another change may require another treatment, for example:

```text
address changed
→ launch an address treatment

tax information changed
→ launch a tax treatment

company identifier changed
→ launch an identifier treatment
```

So the need is to have something flexible and reusable.

---

## 2. Need

The need is simple:

```text
When an important value changes,
the system should be able to detect it,
check if there is a rule for this change,
and trigger the right action.
```

The action can be different depending on the case.

It can be:

```text
- create a task in task_queue
- launch a dedicated process
- update another table
- replay prioritization
- only write an audit/log event
```

So the target is not only a notification mechanism.

The target is a generic mechanism able to trigger an action based on a detected data change.

---

## 3. Proposed Solution

The idea is to add a generic layer between the data update and the action to execute.

Instead of hardcoding the logic directly in the code, we define rules.

Each rule says:

```text
On which table we look
On which column we look
Which change is important
Which action must be triggered
```

Example:

```text
If lifecycle.bnpp_entity changes
and the old value was outside CRDS scope
and the new value is inside CRDS scope
then create a CRDS_NOTIFICATION in task_queue.
```

This way, the CRDS case is just the first rule.
Later, we can add other rules for address, tax, company identifier, or any other business case.

---

## 4. Proposed Configuration Table

To make this flexible, we can create a configuration table.

Example table name:

```text
change_action_rule
```

This table will contain the rules to apply when a change is detected.

### Proposed structure

| Column                | Description                                                 |
| --------------------- | ----------------------------------------------------------- |
| `rule_id`             | Technical identifier of the rule                            |
| `rule_name`           | Functional name of the rule                                 |
| `source_table`        | Table to monitor, for example `lifecycle`, `address`, `tax` |
| `source_column`       | Column to monitor, for example `bnpp_entity`                |
| `old_value_condition` | Condition on the previous value                             |
| `new_value_condition` | Condition on the new value                                  |
| `action_type`         | Type of action to trigger                                   |
| `action_name`         | Name of the action                                          |
| `target_process`      | Process to call if needed                                   |
| `target_table`        | Table to update if needed                                   |
| `is_enabled`          | Allows the rule to be activated or deactivated              |
| `priority`            | Priority if several rules are triggered                     |
| `created_at`          | Creation date                                               |
| `updated_at`          | Last update date                                            |

---

## 5. Example of Rules

| rule_name                 | source_table         | source_column      | condition                                                    | action_type               | action_name                 |
| ------------------------- | -------------------- | ------------------ | ------------------------------------------------------------ | ------------------------- | --------------------------- |
| Entity enters CRDS scope  | `lifecycle`          | `bnpp_entity`      | Old value outside CRDS scope and new value inside CRDS scope | `TASK_QUEUE_NOTIFICATION` | `CRDS_NOTIFICATION`         |
| Address changed           | `address`            | `address_value`    | Any change                                                   | `PROCESS_EXECUTION`       | `ADDRESS_UPDATE_PROCESS`    |
| Tax changed               | `tax`                | `tax_value`        | Any change                                                   | `PROCESS_EXECUTION`       | `TAX_PROCESSING`            |
| Identifier changed        | `company_identifier` | `identifier_value` | Any change                                                   | `PROCESS_EXECUTION`       | `IDENTIFIER_RECONCILIATION` |
| Legal entity data changed | `legal_entity`       | Selected fields    | Any change                                                   | `PRIORITIZATION_REPLAY`   | `UPDATE_IDENTIFICATION`     |

---

## 6. How the Table Will Be Used

When the batch collect updates data, the system compares the old value and the new value.

If a change is detected, the process checks the `change_action_rule` table.

The process looks for a rule matching:

```text
source_table
source_column
old value condition
new value condition
```

If a matching rule is found and the rule is enabled, the configured action is triggered.

For example, for CRDS:

```text
source_table = lifecycle
source_column = bnpp_entity
old_value_condition = NOT_IN_CRDS_SCOPE
new_value_condition = IN_CRDS_SCOPE
action_type = TASK_QUEUE_NOTIFICATION
action_name = CRDS_NOTIFICATION
```

Then the process inserts a task into `task_queue`.

Example task:

```text
task_name      = CRDS_NOTIFICATION
status         = PENDING
tpn_id         = impacted tpn_id
source_table   = lifecycle
source_column  = bnpp_entity
old_value      = previous bnpp_entity value
new_value      = new bnpp_entity value
event_type     = BNPP_ENTITY_ENTERED_CRDS_SCOPE
created_at     = current timestamp
```

The `tpn_id` is very important because it allows the next process to retrieve the related `identity`, `legal_entity`, and all linked tables.

---

## 7. Possible Action Types

The action is not always a notification.

The rule can trigger different types of actions:

| action_type               | Meaning                           |
| ------------------------- | --------------------------------- |
| `TASK_QUEUE_NOTIFICATION` | Insert a new task in `task_queue` |
| `PROCESS_EXECUTION`       | Launch a dedicated process        |
| `DATA_UPDATE`             | Update a target table             |
| `PRIORITIZATION_REPLAY`   | Replay prioritization logic       |
| `AUDIT_ONLY`              | Only write an audit/log event     |

This makes the mechanism reusable.

---

