# orbis.yaml
# ============================================================

"""
chunk_size: 5000

params_defaults: {}

datasets:
  normalized:
    query: |
      SELECT DISTINCT ON (incorporation_country, tax_id)
        local_id,
        flux_source,
        company_name,
        company_name_clean,
        incorporation_country,
        national_registry,
        national_registry_cleaned,
        international_registry,
        tax_id,
        isin_equity_id
      FROM (
        SELECT
          p.local_id,
          p.flux_source,
          p.company_name,
          p.company_name_clean,
          p.incorporation_country,

          STRING_AGG(
            DISTINCT identifier ->> 'company_identifier',
            '|'
            ORDER BY identifier ->> 'company_identifier'
          )
          FILTER (
            WHERE identifier ->> 'company_identifier_nature' = 'N'
              AND identifier ->> 'company_identifier' NOT IN ('NA01', 'NA02')
          ) AS national_registry,

          STRING_AGG(
            DISTINCT REGEXP_REPLACE(identifier ->> 'company_identifier', '[^A-Za-z0-9]', '', 'g'),
            '|'
            ORDER BY REGEXP_REPLACE(identifier ->> 'company_identifier', '[^A-Za-z0-9]', '', 'g')
          )
          FILTER (
            WHERE identifier ->> 'company_identifier_nature' = 'N'
              AND identifier ->> 'company_identifier' NOT IN ('NA01', 'NA02')
          ) AS national_registry_cleaned,

          STRING_AGG(
            DISTINCT identifier ->> 'company_identifier',
            '|'
            ORDER BY identifier ->> 'company_identifier'
          )
          FILTER (
            WHERE identifier ->> 'company_identifier_nature' = 'I'
          ) AS international_registry,

          STRING_AGG(
            DISTINCT tax ->> 'tax_id',
            '|'
            ORDER BY tax ->> 'tax_id'
          ) AS tax_id,

          STRING_AGG(
            DISTINCT isin_equity ->> 'isin_equity_id',
            '|'
            ORDER BY isin_equity ->> 'isin_equity_id'
          ) AS isin_equity_id

        FROM own_9110_svg_um_provider_data_normalized p

        LEFT JOIN LATERAL jsonb_array_elements(p.company_identifier_data) AS identifier ON TRUE
        LEFT JOIN LATERAL jsonb_array_elements(p.tax_data) AS tax ON TRUE
        LEFT JOIN LATERAL jsonb_array_elements(p.isin_equity_data) AS isin_equity ON TRUE

        WHERE {where_clause}
          AND p.tax_data -> 0 ->> 'tax_id' IS NOT NULL
          AND p.tax_data -> 0 ->> 'tax_id' != 'NA02'

        GROUP BY
          p.local_id,
          p.flux_source,
          p.company_name,
          p.company_name_clean,
          p.incorporation_country

        HAVING STRING_AGG(DISTINCT tax ->> 'tax_id', '|') IS NOT NULL
      ) t

      ORDER BY incorporation_country, tax_id, local_id

      {limit_clause}

    schema:
      local_id: Utf8
      flux_source: Utf8
      company_name: Utf8
      company_name_clean: Utf8
      incorporation_country: Utf8
      national_registry: Utf8
      national_registry_cleaned: Utf8
      international_registry: Utf8
      tax_id: Utf8
      isin_equity_id: Utf8
"""


