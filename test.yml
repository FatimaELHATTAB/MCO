If a Legal Entity has a blank status (e.g. CONFIRMED_BLANK_MANUAL or CONFIRMED_BLANK_REFINITIV),

should other sources be allowed to override it?

In other words:
Does "blank" mean "nothing exists and cannot be overridden",
or just "no VAT found for now"? 
    alt VAT provided by RPMP
        MATCH->>LE: status = PROVIDED_BY_RPMP
    else Orbis match found
        MATCH->>LE: status = MATCHING_ORBIS
    else Refinitiv match found
        MATCH->>LE: status = MATCHING_REFINITIV
    else No match
        MATCH->>LE: status = UNDEFINED
    end

    BTVA->>LE: Read Legal Entity

    alt status = PROVIDED_BY_RPMP
        BTVA->>LE: No action (trusted source)

    else VAT can be computed
        BTVA->>BTVA: Compute VAT
        BTVA->>VIES: Validate computed VAT
        alt valid
            VIES-->>BTVA: OK
            BTVA->>LE: status = CONFIRMED_BY_VIES
        else not found
            VIES-->>BTVA: NOT_FOUND
            BTVA->>LE: status = NOT_FOUND
        end

    else VAT cannot be computed
        alt status = MATCHING_ORBIS
            BTVA->>VIES: Validate Orbis VAT
            alt valid
                VIES-->>BTVA: OK
                BTVA->>LE: status = CONFIRMED_BY_ORBIS
            else not found
                VIES-->>BTVA: NOT_FOUND
                BTVA->>LE: status = NOT_FOUND
            end

        else status = MATCHING_REFINITIV
            BTVA->>VIES: Validate Refinitiv VAT
            alt valid
                VIES-->>BTVA: OK
                BTVA->>LE: status = CONFIRMED_BY_REFINITIV
            else not found
                VIES-->>BTVA: NOT_FOUND
                BTVA->>LE: status = NOT_FOUND
            end

        else no fallback
            BTVA->>LE: status = NOT_ELIGIBLE
        end
    end

    opt RPMP update
        BC->>TIR: RPMP data updated
        MATCH->>LE: Recompute status

        BTVA->>LE: Re-read entity

        alt new RPMP VAT present
            BTVA->>LE: status = PROVIDED_BY_RPMP (no VIES)
        else
            BTVA->>BTVA: Recompute VAT
            BTVA->>VIES: Validate
            BTVA->>LE: Update status
        end
    end

    opt External sources update
        BC->>EXT: Orbis / Refinitiv updated
        MATCH->>LE: Update matching status

        BTVA->>LE: Re-read entity

        alt computable
            BTVA->>BTVA: Compute VAT
            BTVA->>VIES: Validate
            BTVA->>LE: status = CONFIRMED_BY_VIES
        else fallback
            BTVA->>VIES: Validate Orbis / Refinitiv
            BTVA->>LE: status updated
        end
    end


