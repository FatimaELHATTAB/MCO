"""
chunk_size: 5000

params_defaults: {}

datasets:
  normalized:
    query: |
      SELECT
        le.local_id,
        le.flux_source,
        le.company_name,
        le.company_name_clean,
        le.incorporation_country,
        le.updated_at,

        STRING_AGG(
          DISTINCT ci.company_identifier,
          '|'
          ORDER BY ci.company_identifier
        )
        FILTER (
          WHERE ci.company_identifier_nature = 'N'
        ) AS national_registry,

        STRING_AGG(
          DISTINCT ci.company_identifier,
          '|'
          ORDER BY ci.company_identifier
        )
        FILTER (
          WHERE ci.company_identifier_nature = 'I'
            AND ci.company_identifier_name = 'LEI'
        ) AS international_registry

      FROM own_9119_svg_um_legal_entity_normalized le

      LEFT JOIN own_9119_svg_um_company_identifier_normalized ci
        ON ci.local_id = le.local_id
       AND ci.flux_source = le.flux_source

      WHERE {where_clause}

      GROUP BY
        le.local_id,
        le.flux_source,
        le.company_name,
        le.company_name_clean,
        le.incorporation_country,
        le.updated_at

      {limit_clause}

    schema:
      local_id: Utf8
      flux_source: Utf8
      company_name: Utf8
      company_name_clean: Utf8
      incorporation_country: Utf8
      updated_at: Datetime
      national_registry: Utf8
      international_registry: Utf8
"""
